services:
  mcp-mosquitto:
    container_name: mcp-mosquitto
    build:
      context: .
      args:
        DOTNET_TAG: ${DOTNET_TAG:-10.0}
    extends:
      file: ../../policies/base.yml
      service: default-policy
    env_file:
      - path: ../../.env
        required: false
    ports:
      - "${MCP_MOSQUITTO_PORT:-9820}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shared_net
