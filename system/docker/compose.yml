services:
  mcp-docker:
    container_name: mcp-docker
    build:
      context: ../..
      dockerfile: system/docker/Dockerfile
      args:
        DOTNET_TAG: ${DOTNET_TAG:-10.0}
    extends:
      file: ../../policies/base.yml
      service: default-policy
    env_file:
      - path: ../../.env
        required: false
    environment:
      DOCKER_SOCKET_PATH: ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    group_add:
      - "${DOCKER_GID:-1001}"
    volumes:
      - type: bind
        source: ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
        target: /var/run/docker.sock
    ports:
      - "${MCP_DOCKER_PORT:-9860}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    networks:
      - shared_net
