services:
  mcp-mailpit:
    container_name: mcp-mailpit
    build:
      context: ../..
      dockerfile: tools/mailpit/Dockerfile
      args:
        DOTNET_TAG: ${DOTNET_TAG:-10.0}
    extends:
      file: ../../policies/base.yml
      service: default-policy
    env_file:
      - path: ../../.env
        required: false
    environment:
      MAILPIT_CONN_DEFAULT_NAME: ${MAILPIT_CONN_DEFAULT_NAME:-default}
      MAILPIT_CONN_DEFAULT_URL: ${MAILPIT_CONN_DEFAULT_URL:-http://host.docker.internal:8025}
    ports:
      - "${MCP_MAILPIT_PORT:-9830}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shared_net
